
services:

  # -------------------------------
  # 🚀 FastAPI Backend
  # -------------------------------
  api:
    build: .
    container_name: fraud_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: always

  # -------------------------------
  # 📊 Streamlit Dashboard
  # -------------------------------
  dashboard:
    build: .
    container_name: fraud_dashboard
    command: streamlit run dashboard/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env
    volumes:
      - .:/app
    restart: always

  # -------------------------------
  # 🔁 Transaction Simulator
  # -------------------------------
  simulator:
    build: .
    container_name: fraud_simulator
    command: python transaction_simulator.py
    depends_on:
      - api
    env_file:
      - .env
    volumes:
      - .:/app
    restart: always